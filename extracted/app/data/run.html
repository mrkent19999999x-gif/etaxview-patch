<script>
function loadXMLDoc(dname)
{
if (window.ActiveXObject)
  {
  xhttp=new ActiveXObject("Msxml2.XMLHTTP.3.0");
  }
else
  {
  xhttp=new XMLHttpRequest();
  }
xhttp.open("GET",dname,false);
xhttp.send("");
return xhttp.responseXML;
}

function transform(partXML, partXSL)
{
  		var vxml = new ActiveXObject("Microsoft.XMLDOM");
        vxml.async = false;
        vxml.load(partXML);
        // Load the XSL
        var vxsl = new ActiveXObject("Microsoft.XMLDOM");
        vxsl.async = false;
        vxsl.load(partXSL);
		ex = TransformToHtmlText(vxml,vxsl);
		document.getElementById('tkhai').innerHTML=ex;
		$('.number').each(function(index){
		var x = $(this).text();
		$(this).text(formatNumber(x));
	    });
		ex=document.getElementById('tkhai').innerHTML;
	    return ex;
  

}
function TransformToHtmlText(xmlDoc, xsltDoc) {
    if (typeof (XSLTProcessor) != "undefined") { // FF, Safari, Chrome etc
        var xsltProcessor = new XSLTProcessor();
        xsltProcessor.importStylesheet(xsltDoc);
        var xmlFragment = xsltProcessor.transformToFragment(xmlDoc, document);
        return GetXmlStringFromXmlDoc(xmlFragment);
    }

    if (typeof (xmlDoc.transformNode) != "undefined") { // IE6, IE7, IE8
		try {
        return xmlDoc.transformNode(xsltDoc);
		}
        catch (err) {   
            return err.message;
        }
    }
    else {
        try { // IE9 and grater
            if (window.ActiveXObject) {
                var xslt = new ActiveXObject("Msxml2.XSLTemplate");
                var xslDoc = new ActiveXObject("Msxml2.FreeThreadedDOMDocument");
                xslDoc.loadXML(xsltDoc.xml);
                xslt.stylesheet = xslDoc;
                var xslProc = xslt.createProcessor();
                xslProc.input = xmlDoc;
                xslProc.transform();
                return xslProc.output;
            }
        }
        catch (e) {           
            return e.message;
        }

    }
}
function displaySig() {
    var result;
    try {
        result = displaySigFunction();
    } catch (e) {
        alert('Đã có lỗi xảy ra: ' + e.message);

    }
}
function showMsgBox(img, msg) {
	document.getElementById('msgImg').src =  img;
	document.getElementById('msg').innerHTML = msg;

function showLoadingMsgBox(msg) {

function hideMsgBox() {
	document.getElementById('msgBox').style.visibility='hidden';
}
function getPdfVer() {
	var info = getAcrobatInfo();
	if (info ==null) return 0;
    if (info.acrobatVersion==null) return 0;
	return  info.acrobatVersion;
}
var getAcrobatInfo = function() {
 
  var getBrowserName = function() {
  return "ie";
  };
 
  var getActiveXObject = function(name) {
    try { return new ActiveXObject(name); } catch(e) {}
  };
 
  var getNavigatorPlugin = function(name) {
    for(key in navigator.plugins) {
      var plugin = navigator.plugins[key];
      if(plugin.name == name) return plugin;
    }
  };
 
  var getPDFPlugin = function() {
    return this.plugin = this.plugin || function() {
      if(getBrowserName() == 'ie') {
        //
        // load the activeX control
        // AcroPDF.PDF is used by version 7 and later
        // PDF.PdfCtrl is used by version 6 and earlier
        return getActiveXObject('AcroPDF.PDF') || getActiveXObject('PDF.PdfCtrl');
      }
      else {
        return getNavigatorPlugin('Adobe Acrobat') || getNavigatorPlugin('Chrome PDF Viewer') || getNavigatorPlugin('WebKit built-in PDF');
      }
    }();
  };
 
  var isAcrobatInstalled = function() {
    return !!getPDFPlugin();
  };
 
  var getAcrobatVersion = function() {
    try {
      var plugin = getPDFPlugin();
 
      if(getBrowserName() == 'ie') {
        var versions = plugin.GetVersions().split(',');
        var latest   = versions[0].split('=');
        return parseFloat(latest[1]);
      }
 
      if(plugin.version) return parseInt(plugin.version);
      return plugin.name
      
    }
    catch(e) {
      return null;
    }
  }
 
  //
  // The returned object
  // 
  return {
    browser:        getBrowserName(),
    acrobat:        isAcrobatInstalled() ? 'installed' : false,
    acrobatVersion: getAcrobatVersion()
  };
};
